name: Apply RabbitMQ Topology
description: Validate and apply a RabbitMQ topology YAML using sprmq.

inputs:
  topology_file:
    description: Relative or absolute path to the topology YAML file.
    required: true
  dotnet_version:
    description: .NET SDK version required to run the sprmq CLI.
    required: false
    default: "10.0.x"
  dotnet_install_dir:
    description: Writable directory where the .NET SDK should be installed when setup-dotnet needs to provision it.
    required: false
    default: ""
  sprmq_tool_path:
    description: Writable directory used to install the fallback sprmq tool when no local manifest entry is available.
    required: false
    default: ""
  tool_version:
    description: Version of sphererabbitmq.iac.tool to install when no local sprmq manifest entry is available.
    required: false
    default: "0.1.3.99"

runs:
  using: composite
  steps:
    - name: Resolve writable tool paths
      id: paths
      shell: bash
      run: |
        set -euo pipefail

        DOTNET_INSTALL_DIR="${{ inputs.dotnet_install_dir }}"
        if [[ -z "$DOTNET_INSTALL_DIR" ]]; then
          DOTNET_INSTALL_DIR="${RUNNER_TEMP}/.dotnet"
        fi

        SPRMQ_TOOL_PATH="${{ inputs.sprmq_tool_path }}"
        if [[ -z "$SPRMQ_TOOL_PATH" ]]; then
          SPRMQ_TOOL_PATH="${RUNNER_TEMP}/sprmq-tool"
        fi

        mkdir -p "$DOTNET_INSTALL_DIR" "$SPRMQ_TOOL_PATH"

        echo "dotnet_install_dir=$DOTNET_INSTALL_DIR" >> "$GITHUB_OUTPUT"
        echo "sprmq_tool_path=$SPRMQ_TOOL_PATH" >> "$GITHUB_OUTPUT"

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ inputs.dotnet_version }}
        dotnet-install-dir: ${{ steps.paths.outputs.dotnet_install_dir }}

    - name: Resolve topology path
      id: topology
      shell: bash
      run: |
        set -euo pipefail
        INPUT_PATH="${{ inputs.topology_file }}"

        if [[ "$INPUT_PATH" = /* ]]; then
          TOPOLOGY_FILE="$INPUT_PATH"
        else
          TOPOLOGY_FILE="${GITHUB_WORKSPACE}/$INPUT_PATH"
        fi

        [ -f "$TOPOLOGY_FILE" ] || { echo "RabbitMQ topology file not found: $TOPOLOGY_FILE"; exit 1; }
        echo "topology_file=$TOPOLOGY_FILE" >> "$GITHUB_OUTPUT"

    - name: Detect local sprmq tool manifest
      id: manifest
      shell: bash
      run: |
        set -euo pipefail
        TOOL_MANIFEST_PATH="${GITHUB_WORKSPACE}/dotnet-tools.json"

        if [[ -f "$TOOL_MANIFEST_PATH" ]] && grep -Eiq '"(sphererabbitmq\\.iac\\.tool|sprmq)"' "$TOOL_MANIFEST_PATH"; then
          echo "use_local_manifest=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "use_local_manifest=false" >> "$GITHUB_OUTPUT"

    - name: Restore local dotnet tools
      if: ${{ steps.manifest.outputs.use_local_manifest == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        dotnet tool restore

    - name: Validate topology with local tool manifest
      if: ${{ steps.manifest.outputs.use_local_manifest == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        dotnet tool run sprmq -- validate --file "${{ steps.topology.outputs.topology_file }}"

    - name: Apply topology with local tool manifest
      if: ${{ steps.manifest.outputs.use_local_manifest == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        dotnet tool run sprmq -- apply --file "${{ steps.topology.outputs.topology_file }}"

    - name: Install sprmq fallback tool
      if: ${{ steps.manifest.outputs.use_local_manifest != 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        dotnet tool install \
          --tool-path "${{ steps.paths.outputs.sprmq_tool_path }}" \
          sphererabbitmq.iac.tool \
          --version "${{ inputs.tool_version }}"

    - name: Validate topology with fallback tool
      if: ${{ steps.manifest.outputs.use_local_manifest != 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        "${{ steps.paths.outputs.sprmq_tool_path }}/sprmq" validate --file "${{ steps.topology.outputs.topology_file }}"

    - name: Apply topology with fallback tool
      if: ${{ steps.manifest.outputs.use_local_manifest != 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        "${{ steps.paths.outputs.sprmq_tool_path }}/sprmq" apply --file "${{ steps.topology.outputs.topology_file }}"
