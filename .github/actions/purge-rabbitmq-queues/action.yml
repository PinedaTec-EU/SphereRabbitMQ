name: Purge RabbitMQ Queues
description: Validate a RabbitMQ topology YAML and purge its declared queues using sprmq.

inputs:
  topology_file:
    description: Relative or absolute path to the topology YAML file.
    required: true
  dotnet_root:
    description: Directory where dotnet is already installed and accessible for the action.
    required: true
  sprmq_tool_path:
    description: Writable directory used to install the fallback sprmq tool when no local manifest entry is available.
    required: false
    default: ""
  tool_version:
    description: Version of sphererabbitmq.iac.tool to install when no local sprmq manifest entry is available.
    required: false
    default: "0.1.3.99"
  dry_run:
    description: When true, runs purge in dry-run mode.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Resolve tool paths
      id: paths
      shell: bash
      run: |
        set -euo pipefail

        DOTNET_ROOT_PATH="${{ inputs.dotnet_root }}"
        [[ -n "$DOTNET_ROOT_PATH" ]] || { echo "dotnet_root is required."; exit 1; }
        [[ -x "$DOTNET_ROOT_PATH/dotnet" ]] || { echo "dotnet executable not found at $DOTNET_ROOT_PATH/dotnet"; exit 1; }

        SPRMQ_TOOL_PATH="${{ inputs.sprmq_tool_path }}"
        if [[ -z "$SPRMQ_TOOL_PATH" ]]; then
          SPRMQ_TOOL_PATH="${RUNNER_TEMP}/sprmq-tool"
        fi

        mkdir -p "$SPRMQ_TOOL_PATH"

        echo "dotnet_root=$DOTNET_ROOT_PATH" >> "$GITHUB_OUTPUT"
        echo "sprmq_tool_path=$SPRMQ_TOOL_PATH" >> "$GITHUB_OUTPUT"

    - name: Configure .NET path
      shell: bash
      run: |
        set -euo pipefail
        echo "DOTNET_ROOT=${{ steps.paths.outputs.dotnet_root }}" >> "$GITHUB_ENV"
        echo "${{ steps.paths.outputs.dotnet_root }}" >> "$GITHUB_PATH"

    - name: Resolve topology path
      id: topology
      shell: bash
      run: |
        set -euo pipefail
        INPUT_PATH="${{ inputs.topology_file }}"

        if [[ "$INPUT_PATH" = /* ]]; then
          TOPOLOGY_FILE="$INPUT_PATH"
        else
          TOPOLOGY_FILE="${GITHUB_WORKSPACE}/$INPUT_PATH"
        fi

        [ -f "$TOPOLOGY_FILE" ] || { echo "RabbitMQ topology file not found: $TOPOLOGY_FILE"; exit 1; }
        echo "topology_file=$TOPOLOGY_FILE" >> "$GITHUB_OUTPUT"

    - name: Detect local sprmq tool manifest
      id: manifest
      shell: bash
      run: |
        set -euo pipefail
        TOOL_MANIFEST_PATH="${GITHUB_WORKSPACE}/dotnet-tools.json"

        if [[ -f "$TOOL_MANIFEST_PATH" ]] && grep -Eiq '"(sphererabbitmq\\.iac\\.tool|sprmq)"' "$TOOL_MANIFEST_PATH"; then
          echo "use_local_manifest=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "use_local_manifest=false" >> "$GITHUB_OUTPUT"

    - name: Build purge arguments
      id: purge_args
      shell: bash
      run: |
        set -euo pipefail

        EXTRA_ARGS="--allow-destructive --auto-approve"
        if [[ "${{ inputs.dry_run }}" == "true" ]]; then
          EXTRA_ARGS="$EXTRA_ARGS --dry-run"
        fi

        echo "args=$EXTRA_ARGS" >> "$GITHUB_OUTPUT"

    - name: Restore local dotnet tools
      if: ${{ steps.manifest.outputs.use_local_manifest == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        dotnet tool restore

    - name: Validate topology with local tool manifest
      if: ${{ steps.manifest.outputs.use_local_manifest == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        dotnet tool run sprmq -- validate --file "${{ steps.topology.outputs.topology_file }}"

    - name: Purge queues with local tool manifest
      if: ${{ steps.manifest.outputs.use_local_manifest == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        dotnet tool run sprmq -- purge --file "${{ steps.topology.outputs.topology_file }}" ${{ steps.purge_args.outputs.args }}

    - name: Install sprmq fallback tool
      if: ${{ steps.manifest.outputs.use_local_manifest != 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        dotnet tool install \
          --tool-path "${{ steps.paths.outputs.sprmq_tool_path }}" \
          sphererabbitmq.iac.tool \
          --version "${{ inputs.tool_version }}"

    - name: Validate topology with fallback tool
      if: ${{ steps.manifest.outputs.use_local_manifest != 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        "${{ steps.paths.outputs.sprmq_tool_path }}/sprmq" validate --file "${{ steps.topology.outputs.topology_file }}"

    - name: Purge queues with fallback tool
      if: ${{ steps.manifest.outputs.use_local_manifest != 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        "${{ steps.paths.outputs.sprmq_tool_path }}/sprmq" purge --file "${{ steps.topology.outputs.topology_file }}" ${{ steps.purge_args.outputs.args }}
