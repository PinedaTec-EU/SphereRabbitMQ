name: Publish NuGet

on:
  push:
    tags:
      - "deploy/global/[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: read

jobs:
  publish:
    uses: PinedaTec-EU/pinedatec-ci/.github/workflows/dotnet-publish-nuget.yml@main
    with:
      solution_file: SphereRabbitMQ.slnx
      tag_prefix: deploy/global/
      test_projects: |
        tests/SphereRabbitMQ.Tests.Unit/SphereRabbitMQ.Tests.Unit.csproj
        tests/SphereRabbitMQ.IaC.Tests.Unit/SphereRabbitMQ.IaC.Tests.Unit.csproj
      pack_projects: |
        src/SphereRabbitMQ.DependencyInjection/SphereRabbitMQ.DependencyInjection.csproj
        src/SphereRabbitMQ.IaC.Cli/SphereRabbitMQ.IaC.Cli.csproj
    secrets:
      nuget_api_key: ${{ secrets.NUGET_API_KEY }}
