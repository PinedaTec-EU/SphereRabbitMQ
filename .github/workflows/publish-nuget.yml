name: Publish NuGet

# Triggered when a tag matching v<major>.<minor>.<patch>[.<revision>] is pushed.
# Examples: v1.0.0  v0.1.1.34
on:
  push:
    tags:
      - "deploy/global/[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: read

jobs:
  publish:
    name: Pack and Publish
    runs-on: [self-hosted, primary]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # Strip the leading 'v' from the tag to get the NuGet package version.
      # Tag v0.1.1.34  →  VERSION=0.1.1.34
      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Restore
        run: dotnet restore SphereRabbitMQ.slnx

      - name: Build
        run: |
          dotnet build SphereRabbitMQ.slnx \
            -c Release \
            --no-restore \
            -p:Version=${{ steps.version.outputs.VERSION }}

      # Unit tests only — integration tests require a live RabbitMQ broker.
      - name: Unit tests
        run: |
          dotnet test tests/SphereRabbitMQ.Tests.Unit/SphereRabbitMQ.Tests.Unit.csproj \
            -c Release --no-build \
            --logger "console;verbosity=normal"
          dotnet test tests/SphereRabbitMQ.IaC.Tests.Unit/SphereRabbitMQ.IaC.Tests.Unit.csproj \
            -c Release --no-build \
            --logger "console;verbosity=normal"

      # Pack the 5 runtime library projects in dependency order.
      # IaC projects and test projects are intentionally excluded.
      - name: Pack
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          PROJECTS=(
            src/SphereRabbitMQ.Domain/SphereRabbitMQ.Domain.csproj
            src/SphereRabbitMQ.Abstractions/SphereRabbitMQ.Abstractions.csproj
            src/SphereRabbitMQ.Application/SphereRabbitMQ.Application.csproj
            src/SphereRabbitMQ.Infrastructure.RabbitMQ/SphereRabbitMQ.Infrastructure.RabbitMQ.csproj
            src/SphereRabbitMQ.DependencyInjection/SphereRabbitMQ.DependencyInjection.csproj
          )
          for project in "${PROJECTS[@]}"; do
            dotnet pack "$project" \
              -c Release \
              --no-build \
              -p:Version=$VERSION \
              --output nupkgs
          done

      - name: List packages
        run: ls -lh nupkgs/

      - name: Push to NuGet.org
        run: |
          dotnet nuget push "nupkgs/*.nupkg" \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
