name: Publish NuGet

# Triggered when a tag matching deploy/global/<major>.<minor>.<patch>[.<revision>] is pushed.
# Examples: deploy/global/1.0.0  deploy/global/0.1.1.34
on:
  push:
    tags:
      - "deploy/global/[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: read

env:
  DOTNET_INSTALL_DIR: /dockers/SDKs/dotnet

jobs:
  publish:
    name: Pack and Publish
    runs-on: [self-hosted, primary]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure .NET path
        shell: bash
        run: |
          set -euo pipefail
          echo "DOTNET_ROOT=${DOTNET_INSTALL_DIR}" >> "$GITHUB_ENV"
          echo "${DOTNET_INSTALL_DIR}" >> "$GITHUB_PATH"

      - name: Check local .NET SDK 10 presence
        id: dotnet_sdk
        shell: bash
        run: |
          set -euo pipefail
          if [ -x "${DOTNET_INSTALL_DIR}/dotnet" ] && DOTNET_ROOT="${DOTNET_INSTALL_DIR}" "${DOTNET_INSTALL_DIR}/dotnet" --list-sdks | awk '{print $1}' | grep -Eq '^10\.0\.'; then
            echo "installed=true" >> "$GITHUB_OUTPUT"
          else
            echo "installed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup .NET SDK 10 (if missing)
        if: ${{ steps.dotnet_sdk.outputs.installed != 'true' }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          cache: false
          cache-dependency-path: "**/*.csproj"

      - name: Report installed .NET SDKs
        shell: bash
        run: |
          set -euo pipefail
          echo "DOTNET_INSTALL_DIR=${DOTNET_INSTALL_DIR}"
          if [ -x "${DOTNET_INSTALL_DIR}/dotnet" ]; then
            DOTNET_ROOT="${DOTNET_INSTALL_DIR}" "${DOTNET_INSTALL_DIR}/dotnet" --list-sdks || true
            echo "--- Size summary ---"
            du -sh "${DOTNET_INSTALL_DIR}" || true
            if [ -d "${DOTNET_INSTALL_DIR}/sdk" ]; then
              du -sh "${DOTNET_INSTALL_DIR}/sdk"/* || true
            fi
          else
            echo "dotnet executable not found at ${DOTNET_INSTALL_DIR}/dotnet"
          fi

      # Extract the version from tags shaped as deploy/global/<version>.
      # Tag deploy/global/0.1.1.34  →  VERSION=0.1.1.34
      - name: Extract version from tag
        shell: bash
        id: version
        run: |
          set -euo pipefail
          PREFIX="deploy/global/"
          if [[ "${GITHUB_REF_NAME}" != ${PREFIX}* ]]; then
            echo "Unexpected tag format: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

          VERSION="${GITHUB_REF_NAME#${PREFIX}}"
          if [[ -z "${VERSION}" ]]; then
            echo "Unable to extract version from tag: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Restore
        run: dotnet restore SphereRabbitMQ.slnx

      - name: Build
        run: |
          dotnet build SphereRabbitMQ.slnx \
            -c Release \
            --no-restore \
            -p:Version=${{ steps.version.outputs.VERSION }}

      # Unit tests only — integration tests require a live RabbitMQ broker.
      - name: Unit tests
        run: |
          dotnet test tests/SphereRabbitMQ.Tests.Unit/SphereRabbitMQ.Tests.Unit.csproj \
            -c Release --no-build \
            --logger "console;verbosity=normal"
          dotnet test tests/SphereRabbitMQ.IaC.Tests.Unit/SphereRabbitMQ.IaC.Tests.Unit.csproj \
            -c Release --no-build \
            --logger "console;verbosity=normal"

      # Pack the all-in-one runtime package.
      # Internal runtime projects are included in the package output through the main project.
      - name: Pack
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          dotnet pack src/SphereRabbitMQ.DependencyInjection/SphereRabbitMQ.DependencyInjection.csproj \
            -c Release \
            --no-restore \
            -p:Version=$VERSION \
            --output nupkgs

      - name: List packages
        run: ls -lh nupkgs/

      - name: Push to NuGet.org
        run: |
          dotnet nuget push "nupkgs/*.nupkg" \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
