# yaml-language-server: $schema=../topology.schema.json
debugQueues:
  enabled: true
  queueSuffix: debug
  exchanges:
    main: true
    secondary: false
  queues:
    main: true
    secondary: false

virtualHosts:
  - name: sales
    exchanges:
      - name: orders
        type: topic
    queues:
      - name: orders.created
        type: classic
    bindings:
      - sourceExchange: orders
        destination: orders.created
        destinationType: queue
        routingKey: orders.created
