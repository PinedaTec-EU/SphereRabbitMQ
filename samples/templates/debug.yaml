# yaml-language-server: $schema=../topology.schema.json
debugQueues:
  enabled: true
  ttl: "00:30:00"

virtualHosts:
  - name: sales
    exchanges:
      - name: orders
        type: topic
        debugQueue: true
    queues:
      - name: orders.created
        type: classic
        debugQueue: true
    bindings:
      - sourceExchange: orders
        destination: orders.created
        destinationType: queue
        routingKey: orders.created
