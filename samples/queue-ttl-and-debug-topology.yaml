broker:
  managementUrl: http://localhost:31672/api/
  username: admin
  password: qwerty12345
  virtualHosts:
    - sales-v2

debugQueues:
  enabled: true
  queueSuffix: debug
  exchanges:
    main: true
    secondary: false
  queues:
    main: true
    secondary: false

metadata:
  owner: platform
  service: ordering

virtualHosts:
  - name: sales-v2
    exchanges:
      - name: orders
        durable: true
      - name: payments
        durable: true
    queues:
      - name: orders.created
        type: quorum
        durable: true
        ttl: "00:10:00"
    bindings:
      - sourceExchange: orders
        destination: orders.created
        destinationType: queue
        routingKey: "orders.created"
